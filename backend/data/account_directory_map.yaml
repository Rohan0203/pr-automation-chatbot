# Maps resource_type → subfolder under the account folder
resource_folders:
  s3: "s3"
  glue_db: "glue_db"
  iam: "iam"
  data_federation: "data_federation"
  resource_policy: "resource_policy"

# Maps resource_type → which field provides the filename
resource_name_fields:
  s3: "bucket_name"
  glue_db: "database_name"
  iam: "role_name"
