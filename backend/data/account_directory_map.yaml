# Maps aws_account_id → folder path in the upstream repo
#
# The upstream repo structure:
#   aws_lakehouse/
#     compute-001/    (s3/, glue_db/, iam/)
#     compute-002/    (s3/, glue_db/, iam/)
#     compute-003/    (s3/, glue_db/, iam/)
#     compute-004/    (s3/, glue_db/, iam/)
#     lakehouse-001/  (s3/, glue_db/, iam/, data_federation/, resource_policy/)
#
# Path formula: aws_lakehouse/{account_folder}/{resource_subfolder}/{resource_name}.yaml

accounts:
  # ─── Dev Accounts ───
  "438465132548":
    folder: "aws_lakehouse/lakehouse-001"
    type: "lakehouse"
    alias: "minerva-dev-lakehouse-001"
    enterprise: "Common"
  "068887784423":
    folder: "aws_lakehouse/compute-001"
    type: "compute"
    alias: "minerva-dev-compute-001"
    enterprise: "AGTR"
  "933999308564":
    folder: "aws_lakehouse/compute-002"
    type: "compute"
    alias: "minerva-dev-compute-002"
    enterprise: "FOOD"
  "836901248866":
    folder: "aws_lakehouse/compute-003"
    type: "compute"
    alias: "minerva-dev-compute-003"
    enterprise: "SPEC"
  "324612370323":
    folder: "aws_lakehouse/compute-004"
    type: "compute"
    alias: "minerva-dev-compute-004"
    enterprise: "CORP"

  # ─── Prod Accounts ───
  "578647603827":
    folder: "aws_lakehouse/lakehouse-001"
    type: "lakehouse"
    alias: "minerva-prod-lakehouse-001"
    enterprise: "Common"
  "367241115350":
    folder: "aws_lakehouse/compute-001"
    type: "compute"
    alias: "minerva-prod-compute-001"
    enterprise: "AGTR"
  "884308299029":
    folder: "aws_lakehouse/compute-002"
    type: "compute"
    alias: "minerva-prod-compute-002"
    enterprise: "FOOD"
  "011379513867":
    folder: "aws_lakehouse/compute-003"
    type: "compute"
