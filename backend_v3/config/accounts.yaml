# AWS Account Directory
# Source: Minerva Multi-Account Naming Conventions
# Tools use this for derivation + validation. LLM never reads this directly.

accounts:
  # Dev Lakehouse
  - id: "438465132548"
    alias: minerva-dev-lakehouse-001
    abbreviation: dev-lh1
    plat_env: dev
    type: lakehouse
    enterprise: all  # any enterprise can use lakehouse

  # Dev Compute
  - id: "068887784423"
    alias: minerva-dev-compute-001
    abbreviation: dev-cmp1
    plat_env: dev
    type: compute
    enterprise: AGTR

  - id: "933999308564"
    alias: minerva-dev-compute-002
    abbreviation: dev-cmp2
    plat_env: dev
    type: compute
    enterprise: FOOD

  - id: "836901248866"
    alias: minerva-dev-compute-003
    abbreviation: dev-cmp3
    plat_env: dev
    type: compute
    enterprise: SPEC

  - id: "324612370323"
    alias: minerva-dev-compute-004
    abbreviation: dev-cmp4
    plat_env: dev
    type: compute
    enterprise: CORP

  # Prod Lakehouse
  - id: "578647603827"
    alias: minerva-prod-lakehouse-001
    abbreviation: prd-lh1
    plat_env: prd
    type: lakehouse
    enterprise: all

  # Prod Compute
  - id: "367241115350"
    alias: minerva-prod-compute-001
    abbreviation: prd-cmp1
    plat_env: prd
    type: compute
    enterprise: AGTR

  - id: "884308299029"
    alias: minerva-prod-compute-002
    abbreviation: prd-cmp2
    plat_env: prd
    type: compute
    enterprise: FOOD

  - id: "011379513867"
    alias: minerva-prod-compute-003
    abbreviation: prd-cmp3
    plat_env: prd
    type: compute
    enterprise: SPEC

  - id: "632247962242"
    alias: minerva-prod-compute-004
    abbreviation: prd-cmp4
    plat_env: prd
    type: compute
    enterprise: CORP

# Enterprise ↔ Subgroup mapping (for validation)
enterprises:
  AGTR:
    name: "Ag & Trading"
    subgroups: [APAC, LATAM, NA, TDA, WTG]
  CORP:
    name: "Corporate"
    subgroups: [DTD, FIN, FSQR, GTC, CPT, EHS, DPE]
    subgroup_required: true
  FOOD:
    name: "Food"
    subgroups: [PRGL, FSGL, PR_NA]
  SPEC:
    name: "Specialized Portfolio"
    subgroups: [ANH, BIO]
