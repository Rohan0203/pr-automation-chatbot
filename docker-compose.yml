services:
  postgres:
    image: postgres:16-alpine
    container_name: pr_chatbot_db
    environment:
      POSTGRES_USER: chatbot
      POSTGRES_PASSWORD: chatbot_pass
      POSTGRES_DB: pr_chatbot
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U chatbot -d pr_chatbot"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  pgdata:
