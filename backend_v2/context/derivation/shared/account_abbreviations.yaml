version: 1
kind: shared_account_abbreviations
source: governance_naming_convention_excerpt
notes:
  - This file captures approved AWS account abbreviations from governance context.
  - Includes 12-digit account IDs for dev and prod abbreviations.
  - Sandbox rows are intentionally excluded.

