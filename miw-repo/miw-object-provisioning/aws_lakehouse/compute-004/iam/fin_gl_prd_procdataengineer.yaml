intake_id: M0000432
role_name: fin_gl_prd_procdataengineer
role_description: IAM role for programmatic General Ledger Data Engineer to execute DBT+GLUE jobs
aws_account_id: '632247962242'
enterprise_or_func_name: CORP
enterprise_or_func_subgrp_name: FIN
role_owner: "kevin_woelk@cargill.com"
data_env: prd
usage_type: "DataEngineer"
max_session_duration: 2
compute_size: "LRG"
access_to_resources:
    glue_databases:
        write:
        - fin_general_ledger_curated_prd
        - fin_general_ledger_serving_prd
        read:
          - 578647603827:lh_sap_tcf_raw_serving_prd_rl
          - 578647603827:lh_fin_manual_upload_raw_serving_prd_rl
          - 578647603827:lh_jdw_raw_serving_prd_rl
          - fin_master_data_serving_prd
    data_prefixes:
    - "s3://prd-cmp4-corp-fin-dp/curated/prd/fin/general_ledger/"
    - "s3://prd-cmp4-corp-fin-dp/serving/prd/fin/general_ledger/"
    execution_asset_prefixes:
    - "s3://prd-cmp4-corp-fin-eng-assets/prd/fin/athena/"
    - "s3://prd-cmp4-corp-fin-eng-assets/prd/fin/glue/"
    - "s3://prd-cmp4-corp-fin-scripts/prd/fin/glue/"
    glue_crawler:
    - null
enable_glue_interactive_session: true
athena_access_config:
    enable_athena_access: true
    athena_workgroup_name: fin_gl_prd_eng_lrg
glue_job_access_config:
  enable_glue_jobs: true
  job_control_configs:
    - corp-fin
# Configurations for Snowflake Catalog Federation
snowflake_iceberg_support: true
