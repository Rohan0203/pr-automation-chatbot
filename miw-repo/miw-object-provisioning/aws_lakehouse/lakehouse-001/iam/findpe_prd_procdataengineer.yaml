intake_id: M0000449
role_name: findpe_prd_procdataengineer
role_description: IAM role to serve Data Engineering Use Cases in Lakehouse
aws_account_id: '578647603827'
enterprise_or_func_name: CORP
enterprise_or_func_subgrp_name: FIN
role_owner: "kayode_dosunmu@cargill.com"
data_env: prd
usage_type: "DataEngineer"
max_session_duration: 8
compute_size: "XLRG"
access_to_resources:
    glue_databases:
        write:
        - lh_sap_tcf_raw_serving_prd
        - lh_sap_tcl_raw_serving_prd
        - lh_jdw_raw_serving_prd
        - lh_fin_manual_upload_raw_serving_prd
        - lh_onestream_raw_serving_prd
        - lh_concur_raw_serving_prd
        - lh_sap_rm_raw_serving_prd
        - lh_fin_jdee1_raw_serving_prd
        read:
        - lkc-myrp67
        - lh_sap_tcf_raw_prd
        - lh_cdp_sap_tcf_raw_prd
        - lh_sap_tcl_raw_prd
        - lh_cdp_sap_tcl_raw_prd
        - lh_jdw_raw_prd
        - lh_cdp_jdw_raw_prd
        - lh_fin_manual_upload_raw_prd
        - lh_cdp_fin_manual_upload_raw_prd
        - lh_onestream_raw_prd
        - lh_concur_raw_prd
        - lh_cdp_sap_rm_raw_prd
        - lh_sap_rm_raw_prd
        - lh_fin_jdee1_raw_prd
        - lh_cdp_fin_jdee1_raw_prd
    data_prefixes:
    - "s3://prd-lh1-corp-fin-src/raw_serving/prd/src/sap_tcf/"
    - "s3://prd-lh1-corp-fin-src/raw_serving/prd/src/sap_tcl/"
    - "s3://prd-lh1-corp-fin-src/raw_serving/prd/src/jdw/"
    - "s3://prd-lh1-corp-fin-src/raw_serving/prd/src/fin_manual_upload/"
    - "s3://prd-lh1-corp-fin-src/raw_serving/prd/src/onestream/"
    - "s3://prd-lh1-corp-fin-src/raw_serving/prd/src/concur/"
    - "s3://prd-lh1-corp-fin-src/raw_serving/prd/src/sap_rm/"
    - "s3://prd-lh1-corp-fin-src/raw_serving/prd/src/fin_jdee1/"
    execution_asset_prefixes:
    - "s3://prd-lh1-corp-fin-eng-assets/prd/fin/athena/"
    - "s3://prd-lh1-corp-fin-eng-assets/prd/fin/glue/"
    - "s3://prd-lh1-corp-fin-scripts/prd/fin/glue/"
    glue_crawler:
    - null
enable_glue_interactive_session: true
athena_access_config:
    enable_athena_access: true
    athena_workgroup_name: fin_prd_eng_xsml
glue_job_access_config:
  enable_glue_jobs: true
  job_control_configs:
    - corp-fin
# Configurations for Snowflake Catalog Federation
snowflake_iceberg_support: true
