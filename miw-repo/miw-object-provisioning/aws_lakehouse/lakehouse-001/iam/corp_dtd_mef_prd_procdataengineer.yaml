intake_id: M-0000517
role_name: corp_dtd_mef_prd_procdataengineer
role_description: IAM role for AWS Glue crawler to access S3 and Glue Data Catalog for MEF team
aws_account_id: '578647603827'
enterprise_or_func_name: CORP
enterprise_or_func_subgrp_name: DTD
role_owner: "viviana_chevezroman@cargill.com"
data_env: prd
usage_type: "DataEngineer"
max_session_duration: 2
compute_size: "SML"
access_to_resources:
    glue_databases:
        write:
        - lh_nyc_taxi_raw_serving_prd
        read:
        - lh_nyc_taxi_raw_prd
    execution_asset_prefixes:
    - "s3://prd-lh1-corp-dtd-scripts/prd/dtd/glue/"
    - "s3://prd-lh1-corp-dtd-eng-assets/prd/dtd/glue/"
    - "s3://prd-lh1-corp-dtd-eng-assets/prd/dtd/athena/"
    data_prefixes:
    - "s3://prd-lh1-corp-dtd-src/raw/serving/prd/src/nyc_taxi/"
    glue_crawler:
    - null
enable_glue_interactive_session: true
athena_access_config:
    enable_athena_access: true
    athena_workgroup_name: corp_dtd_mef_prd_eng_xsml
glue_job_access_config:
  enable_glue_jobs: true
  job_control_configs:
    - nyc-taxi
