intake_id: I-123456
sg_name: spec_anh_prd_kafka_output_port_sg
sg_description: Security group allowing outbound rules to egress data for ANH via Kafka Output Port Pattern.
aws_account_id: 578647603827
env: prd
enterprise_or_func_name: SPEC
enterprise_or_func_subgrp_name: ANH
sg_owner: abc_xyz@cargill.com
vpc_id: <VPC_ID> #Please collaborate with MIW to figure out the VPC_ID to use.
ingress_rules:
  - protocol: tcp
    from_port: 443
    to_port: 443
    source_type: cidr
    source_value: 10.0.0.0/16
    rule_description: HTTPS from internal network
egress_rules: #Note below is just an example, please don't allow all traffic outbound access since it's a data security risk
  - protocol: -1
    from_port: -1
    to_port: -1
    destination_type: cidr
    destination_value: 0.0.0.0/0
    rule_description: Allow all outbound traffic
