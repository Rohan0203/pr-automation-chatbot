name: "MIW Request Intake"
description: "Please complete all required fields before submitting the request."

body:
  - type: textarea
    id: objective
    attributes:
      label: "1. What is the objective of this request?"
      description: "Describe the use case or business purpose."
      placeholder: |
        e.g., Provisioning a new resource to support ingestion of customer
        transaction data for reporting and analytics.
    validations:
      required: true

  - type: input
    id: data_flow
    attributes:
      label: "2. What is the data flow or usage pattern?"
      description: "Batch, streaming, hybrid, or ad‑hoc."
      placeholder: |
        e.g., Batch ingestion of daily files from an upstream system.
    validations:
      required: true

  - type: textarea
    id: priority_timeline
    attributes:
      label: "3. What is the priority and timeline?"
      description: "Confirm awareness of MIW SLA (72 hours)."
      placeholder: |
        e.g., High priority; needed before quarter-end reporting.
    validations:
      required: true

  - type: textarea
    id: approval_status
    attributes:
      label: "4. Approval & naming conventions"
      description: "Has the intake request been approved and is it in Ready for Design state? Naming conventions followed?"
      placeholder: |
        e.g., Approved on 12-Sep, in Ready for Design state, naming conventions followed.
    validations:
      required: true

  - type: textarea
    id: compute_access
    attributes:
      label: "5. Compute & access requirements"
      description: "Include sizing recommendations, roles, and access mode."
      placeholder: |
        e.g., Medium compute; AD group created; programmatic + console access.
    validations:
      required: true

  - type: textarea
    id: dependencies_risks
    attributes:
      label: "6. Dependencies, risks, special considerations"
      description: "Anything MIW team should know before approving."
      placeholder: |
        e.g., Dependency on upstream vendor file delivery.
    validations:
      required: true

  - type: dropdown
    id: enterprise_function_label
    attributes:
      label: "Enterprise / Function Subgroup"
      description: "Select the appropriate enterprise/function subgroup."
      options:
        - AGTR_APAC
        - AGTR_CRM
        - AGTR_EMEA
        - AGTR_LATAM
        - AGTR_MET
        - AGTR_NA
        - AGTR_OT
        - AGTR_TCM
        - AGTR_WTG_CDAS
        - AGTR_WTG
        - AGTR
        - CORP-AUDIT
        - CORP-CPT
        - CORP-DTD_DPE
        - CORP-DTD_GIS
        - CORP-DTD
        - CORP-EHS
        - CORP-FIN
        - CORP-FSQR
        - CORP-GI_SUST
        - CORP-GTC
        - CORP-HR
        - CORP-LAW
        - CORP-RMG
        - FOOD_CE
        - FOOD_FS_APAC
        - FOOD_FS_EMEA
        - FOOD_FS_LATAM
        - FOOD_FS_NA
        - FOOD_FSGL
        - FOOD_PR_APAC
        - FOOD_PR_LATAM
        - FOOD_PR_NA
        - FOOD_PRGL
        - FOOD_RD
        - FOOD_SALT
        - FOOD
        - SPEC_ANH
        - SPEC_CBI
        - SPEC_DS
    validations:
      required: true
